<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Camden · Burlington County Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0d; --panel:#121418; --panel2:#171a1f; --line:#24282f;
    --ink:#e9edf2; --grey:#aab2bd; --muted:#6b7482;
    --gold:#d4a017; --gold2:#e8b923; --green:#2ecc71; --red:#e5484d;
    --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --font-display:'Bebas Neue',var(--font);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px}
  a{color:var(--gold2);text-decoration:none}

  header{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0d0f13,#0a0b0d)}
  .logo{width:44px;height:44px;border:2px solid var(--gold);display:grid;place-items:center;font-family:var(--font-display);font-size:26px;color:var(--gold);border-radius:4px}
  .brand h1{margin:0;font-family:var(--font-display);font-size:26px;letter-spacing:2px;line-height:1}
  .brand p{margin:2px 0 0;color:var(--muted);font-size:12px;letter-spacing:.4px}
  .brand b{color:var(--gold2)}

  /* stat cards */
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .card .k{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .card .v{font-family:var(--font-display);font-size:32px;letter-spacing:1px;margin-top:4px;color:var(--gold2)}
  .card .s{font-size:11px;color:var(--grey);margin-top:2px}

  /* view toggle */
  .views{display:flex;gap:8px;padding:4px 24px 0}
  .view-btn{background:transparent;border:1px solid var(--line);color:var(--grey);padding:8px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-weight:600;font-size:13px;border-bottom:none}
  .view-btn.active{background:var(--panel);color:var(--gold2);border-color:var(--gold)}

  /* filter pills */
  .pills{display:flex;flex-wrap:wrap;gap:8px;padding:14px 24px;background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);color:var(--grey);
    padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12.5px;font-weight:500;white-space:nowrap}
  .pill:hover{border-color:var(--muted)}
  .pill.active{background:var(--gold);color:#0a0b0d;border-color:var(--gold);font-weight:700}
  .pill .n{font-size:11px;background:rgba(255,255,255,.08);padding:1px 7px;border-radius:10px;color:var(--grey)}
  .pill.active .n{background:rgba(0,0,0,.18);color:#0a0b0d}

  /* toolbar */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 24px}
  .toolbar input,.toolbar select{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:8px 11px;border-radius:6px;font-family:var(--font);font-size:13px}
  #q{flex:1;min-width:220px}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--grey);padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12.5px}
  .btn:hover{border-color:var(--gold)}
  .btn.gold{background:var(--gold);color:#0a0b0d;border-color:var(--gold)}
  .status{padding:2px 24px 10px;color:var(--grey);font-size:13px}
  .status b{color:var(--gold2)}

  /* table */
  .tablewrap{padding:0 24px 40px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th{position:sticky;top:0;background:#0d0f13;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;z-index:2}
  td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:rgba(255,255,255,.02)}
  .owner{font-weight:600}
  .sub{color:var(--muted);font-size:11.5px;margin-top:2px}
  .val{font-variant-numeric:tabular-nums;white-space:nowrap}
  .muted{color:var(--muted)}

  /* type pills */
  .type{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
  .t-lis{background:rgba(59,130,246,.15);color:#7ab6ff;border:1px solid rgba(59,130,246,.4)}
  .t-fc{background:rgba(229,72,77,.15);color:#ff8b8e;border:1px solid rgba(229,72,77,.4)}
  .t-pre{background:rgba(240,150,30,.15);color:#f5b556;border:1px solid rgba(240,150,30,.4)}
  .t-jud{background:rgba(168,85,247,.15);color:#c99bff;border:1px solid rgba(168,85,247,.4)}
  .t-tax{background:rgba(20,184,166,.15);color:#5fded0;border:1px solid rgba(20,184,166,.4)}
  .t-lien{background:rgba(212,160,23,.15);color:var(--gold2);border:1px solid rgba(212,160,23,.4)}
  .t-def{background:rgba(150,160,175,.12);color:var(--grey);border:1px solid var(--line)}
  .new{display:inline-block;margin-left:6px;background:var(--green);color:#05230f;font-size:9.5px;font-weight:800;
    padding:2px 6px;border-radius:4px;letter-spacing:.5px;vertical-align:middle}

  /* flag chips */
  .flags{display:flex;flex-wrap:wrap;gap:4px;max-width:210px}
  .fl{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;white-space:nowrap;border:1px solid}
  .fl-vac{color:#f5b556;border-color:rgba(240,150,30,.4);background:rgba(240,150,30,.1)}
  .fl-tax{color:#5fded0;border-color:rgba(20,184,166,.4);background:rgba(20,184,166,.1)}
  .fl-hoa{color:var(--gold2);border-color:rgba(212,160,23,.4);background:rgba(212,160,23,.1)}
  .fl-land{color:#ff8b8e;border-color:rgba(229,72,77,.4);background:rgba(229,72,77,.1)}
  .fl-prob{color:#e59bd0;border-color:rgba(220,100,180,.4);background:rgba(220,100,180,.1)}
  .fl-exp{color:#c99bff;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1)}
  .fl-pre{color:#f5b556;border-color:rgba(240,150,30,.4);background:rgba(240,150,30,.1)}
  .fl-abs{color:var(--grey);border-color:var(--line);background:var(--panel2)}
  .eq-high{color:var(--green);font-weight:700}

  /* calendar view */
  .cal{padding:8px 24px 40px}
  .cal-day{margin-bottom:18px}
  .cal-date{font-family:var(--font-display);font-size:20px;letter-spacing:1px;color:var(--gold2);border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:8px}
  .cal-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}

  /* calculator modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:50;place-items:center}
  .modal.open{display:grid}
  .modal-box{background:var(--panel);border:1px solid var(--gold);border-radius:10px;width:400px;max-width:92vw}
  .modal-head{font-family:var(--font-display);font-size:22px;letter-spacing:1px;color:var(--gold2);padding:16px 18px;border-bottom:1px solid var(--line);position:relative}
  .modal-head .x{position:absolute;right:16px;top:15px;cursor:pointer;color:var(--muted)}
  .calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px}
  .calc-grid label{display:flex;flex-direction:column;gap:5px;font-size:11px;text-transform:uppercase;color:var(--muted)}
  .calc-grid input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px;border-radius:6px}
  .calc-out{padding:0 18px 18px}
  .calc-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line)}
  .calc-row b{font-variant-numeric:tabular-nums;color:var(--gold2);font-size:18px}
  .calc-row.muted span{color:var(--muted);font-size:11px}
  .empty{padding:60px 24px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="logo">CB</div>
  <div class="brand">
    <h1>Camden · Burlington County Intel</h1>
    <p>Motivated-seller lead intelligence · <b>Camden</b> + <b>Burlington</b> County, NJ</p>
  </div>
</header>

<div class="cards" id="cards"></div>

<div class="views">
  <button class="view-btn" data-view="new">New Leads</button>
  <button class="view-btn" data-view="all">All Leads</button>
  <button class="view-btn" data-view="calendar">Foreclosure Calendar</button>
</div>

<div class="pills" id="pills"></div>

<div class="toolbar">
  <input id="q" placeholder="Search owner, address, town…" oninput="render()">
  <select id="county" onchange="render()">
    <option value="">All counties</option><option>Camden</option><option>Burlington</option>
  </select>
  <select id="sort" onchange="render()">
    <option value="recent">Newest first</option>
    <option value="value">Est. value ▼</option>
    <option value="equity">Est. equity ▼</option>
    <option value="owner">Owner A–Z</option>
  </select>
  <input id="from" type="date" onchange="render()" title="Filed from">
  <input id="to" type="date" onchange="render()" title="Filed to">
  <button class="btn gold" onclick="openCalc()">📐 Calculator</button>
  <button class="btn" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div class="status" id="status"></div>
<div class="tablewrap" id="tablewrap"></div>
<div class="cal" id="calwrap" style="display:none"></div>

<div class="modal" id="calc-modal">
  <div class="modal-box">
    <div class="modal-head">Deal Calculator <span class="x" onclick="closeCalc()">✕</span></div>
    <div class="calc-grid">
      <label>ARV (after-repair value)<input type="number" id="c-arv" value="0" oninput="calc()"></label>
      <label>Estimated repairs<input type="number" id="c-rep" value="0" oninput="calc()"></label>
      <label>MAO % of ARV<input type="number" id="c-pct" value="70" oninput="calc()"></label>
      <label>Assignment fee<input type="number" id="c-fee" value="10000" oninput="calc()"></label>
    </div>
    <div class="calc-out">
      <div class="calc-row"><span>Max Allowable Offer (MAO)</span><b id="c-mao">$0</b></div>
      <div class="calc-row"><span>MAO minus your assignment fee</span><b id="c-buy">$0</b></div>
      <div class="calc-row muted"><span>= (ARV × MAO%) − repairs − fee</span><span></span></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
const el=id=>document.getElementById(id);
let BOARD={records:[]}, RECS=[], VIEW="new", PILL="all";

// ---- distress flag chips ----
const FLAGS=[["flag_vacant","Vacant","fl-vac"],["flag_tax_delinquent","Tax Delinquent","fl-tax"],
  ["flag_hoa_lien","HOA Lien","fl-hoa"],["flag_tired_landlord","Tired Landlord","fl-land"],
  ["flag_probate","Probate","fl-prob"],["flag_expired_listing","Expired Listing","fl-exp"],
  ["flag_preforeclosure","Preforeclosure","fl-pre"]];

// ---- filter pill definitions: key + label + predicate ----
const has=(r,w)=>((r.lead_stages||[]).join(" ")+" "+(r.doc_types||[]).join(" ")+" "+(r.lead_type||"")).toLowerCase().includes(w);
const PILLS=[
  ["all","All",()=>true],
  ["lis","Lis Pendens",r=>has(r,"lis pendens")],
  ["fc","Foreclosure",r=>has(r,"sheriff")||has(r,"foreclosure")||r.flag_preforeclosure===true],
  ["tax","Tax",r=>r.flag_tax_delinquent===true||has(r,"tax")],
  ["jud","Judgment",r=>has(r,"judg")],
  ["lien","Lien",r=>r.flag_hoa_lien===true||has(r,"lien")],
  ["probate","Probate",r=>r.flag_probate===true],
  ["vacant","Vacant",r=>r.flag_vacant===true],
  ["hoa","HOA Lien",r=>r.flag_hoa_lien===true],
  ["land","Tired Landlord",r=>r.flag_tired_landlord===true],
  ["expired","Expired",r=>r.flag_expired_listing===true],
];
const pillPred=k=>(PILLS.find(p=>p[0]===k)||PILLS[0])[2];

// ---- helpers ----
const money=v=>v?"$"+Math.round(v).toLocaleString():"—";
const equity=r=>{const ev=r.estimated_value,sp=(r.parcel||{}).last_sale_price;
  return (ev&&sp&&ev>sp)?ev-sp:null;};
function typeClass(t){t=(t||"").toLowerCase();
  if(t.includes("lis"))return"t-lis"; if(t.includes("sheriff")||t.includes("foreclos"))return"t-fc";
  if(t.includes("prefore"))return"t-pre"; if(t.includes("judg"))return"t-jud";
  if(t.includes("tax"))return"t-tax"; if(t.includes("lien"))return"t-lien"; return"t-def";}
function mailing(r){const p=r.parcel||{}; const a=p.owner_mailing_address;
  if(!a)return""; const cs=[p.owner_mailing_city,p.owner_mailing_state].filter(Boolean).join(", ");
  return a+(cs?" · "+cs:"")+(p.owner_mailing_zip?" "+p.owner_mailing_zip:"");}

// ---- scope: county + date + search + view (NOT the active pill) ----
function scoped(){
  const q=el("q").value.trim().toLowerCase(), cty=el("county").value,
        from=el("from").value, to=el("to").value;
  return RECS.filter(r=>{
    if(cty && r.county!==cty) return false;
    if(VIEW==="new" && r.new!==true) return false;
    const d=r.most_recent_date||"";
    if(from && d<from) return false;
    if(to && d>to) return false;
    if(q){const hay=[r.owner,r.address,r.municipality,mailing(r)].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}
function matches(){ return scoped().filter(pillPred(PILL)); }

// ---- render ----
function sortRows(rows){
  const s=el("sort").value;
  const by={recent:(a,b)=>(b.most_recent_date||"").localeCompare(a.most_recent_date||""),
    value:(a,b)=>(b.estimated_value||0)-(a.estimated_value||0),
    equity:(a,b)=>(equity(b)||0)-(equity(a)||0),
    owner:(a,b)=>(a.owner||"").localeCompare(b.owner||"")};
  return rows.slice().sort(by[s]||by.recent);
}
function render(){
  const sc=scoped();
  el("pills").innerHTML=PILLS.map(([k,label,pred])=>{
    const n=sc.filter(pred).length;
    return `<span class="pill ${k===PILL?'active':''}" onclick="setPill('${k}')">${label}<span class="n">${n}</span></span>`;
  }).join("");

  if(VIEW==="calendar"){ renderCalendar(sc); return; }
  el("calwrap").style.display="none"; el("tablewrap").style.display="";

  const rows=sortRows(matches());
  const total=RECS.length;
  el("status").innerHTML = VIEW==="new"
    ? `Showing <b>${rows.length}</b> new leads since last run (${BOARD.run_date||""})`
    : `Showing <b>${rows.length}</b> of ${total} leads`;

  if(!rows.length){ el("tablewrap").innerHTML=`<div class="empty">No leads match these filters.</div>`; return; }
  el("tablewrap").innerHTML=`<table><thead><tr>
    <th>Type</th><th>Doc</th><th>Filed</th><th>Owner / Grantor</th><th>Property Address</th>
    <th>Mailing Address</th><th>Est. Value</th><th>Est. Equity</th><th>Flags</th></tr></thead><tbody>${
    rows.map(rowHTML).join("")}</tbody></table>`;
}
function rowHTML(r){
  const eq=equity(r);
  const chips=FLAGS.filter(([f])=>r[f]===true).map(([f,lbl,cls])=>`<span class="fl ${cls}">${lbl}</span>`).join("")
    + (r.absentee?`<span class="fl fl-abs">Absentee</span>`:"")
    + (r.out_of_state?`<span class="fl fl-abs">Out-of-state</span>`:"");
  const doc=(r.doc_types||[]).filter(x=>x&&x!==r.lead_type).join(", ")||(r.lead_stages||[]).join(", ")||"—";
  const mail=mailing(r);
  return `<tr>
    <td><span class="type ${typeClass(r.lead_type)}">${r.lead_type||"—"}</span>${r.new?'<span class="new">NEW</span>':''}</td>
    <td class="muted">${doc}</td>
    <td class="val">${r.most_recent_date||"—"}</td>
    <td><div class="owner">${r.owner||"—"}</div>${r.signal_count>1?`<div class="sub">${r.signal_count} signals</div>`:""}</td>
    <td>${r.address||'<span class="muted">— no address —</span>'}<div class="sub">${r.municipality||""} ${r.county}</div></td>
    <td>${mail?mail:'<span class="muted">—</span>'}</td>
    <td class="val">${money(r.estimated_value)}</td>
    <td class="val ${r.high_equity?'eq-high':''}">${eq?money(eq):(r.high_equity?'High':'—')}</td>
    <td><div class="flags">${chips||'<span class="muted">—</span>'}</div></td>
  </tr>`;
}
function renderCalendar(sc){
  el("tablewrap").style.display="none"; el("calwrap").style.display="";
  const fc=sc.filter(r=>has(r,"sheriff")||has(r,"foreclosure")||has(r,"lis pendens")||r.flag_preforeclosure===true)
    .filter(r=>r.most_recent_date).sort((a,b)=>(a.most_recent_date).localeCompare(b.most_recent_date));
  el("status").innerHTML=`Foreclosure calendar — <b>${fc.length}</b> foreclosure-track leads by date`;
  if(!fc.length){el("calwrap").innerHTML=`<div class="empty">No foreclosure-track leads in scope.</div>`;return;}
  const by={};
  fc.forEach(r=>{(by[r.most_recent_date]=by[r.most_recent_date]||[]).push(r);});
  el("calwrap").innerHTML=Object.keys(by).sort().map(d=>`<div class="cal-day">
    <div class="cal-date">${d}</div>${by[d].map(r=>`<div class="cal-row">
      <div><span class="type ${typeClass(r.lead_type)}">${r.lead_type}</span> ${r.owner||""}
        <span class="muted">— ${r.address||r.municipality||""}, ${r.county}</span></div>
      <div class="val muted">${money(r.estimated_value)}</div></div>`).join("")}</div>`).join("");
}
function setPill(k){PILL=k;render();}

// ---- stat cards ----
function renderCards(){
  const total=RECS.length||1;
  const newCount=RECS.filter(r=>r.new===true).length;
  const withAddr=RECS.filter(r=>(r.address||"").trim()).length;
  const dr=BOARD.date_range||{};
  el("cards").innerHTML=[
    ["Total Records",total.toLocaleString(),"Camden + Burlington"],
    ["New This Week",newCount.toLocaleString(),`since ${BOARD.run_date||"—"}`],
    ["With Address",withAddr.toLocaleString(),`${Math.round(100*withAddr/total)}% of board`],
    ["Date Range",(dr.min||"—").slice(0,7),`${dr.min||"?"} → ${dr.max||"?"}`],
  ].map(([k,v,s])=>`<div class="card"><div class="k">${k}</div><div class="v">${v}</div><div class="s">${s}</div></div>`).join("");
}
document.querySelectorAll(".view-btn").forEach(b=>b.onclick=()=>{
  VIEW=b.dataset.view;
  document.querySelectorAll(".view-btn").forEach(x=>x.classList.toggle("active",x===b));
  render();
});

// ---- calculator ----
const $c=id=>+(el(id).value||0);
function openCalc(){el("calc-modal").classList.add("open");calc();}
function closeCalc(){el("calc-modal").classList.remove("open");}
function calc(){const arv=$c("c-arv"),rep=$c("c-rep"),pct=$c("c-pct")/100,fee=$c("c-fee");
  const mao=Math.max(0,arv*pct-rep);
  el("c-mao").textContent="$"+Math.round(mao).toLocaleString();
  el("c-buy").textContent="$"+Math.round(Math.max(0,mao-fee)).toLocaleString();}

// ---- CSV export (current filtered view) ----
function exportCSV(){
  const rows=sortRows(matches());
  const cols=["county","municipality","type","doc","filed","owner","property_address",
    "mailing_address","est_value","est_equity","new","flags"];
  const q=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const line=r=>[r.county,r.municipality,r.lead_type,(r.doc_types||[]).join("|"),r.most_recent_date,
    r.owner,r.address,mailing(r),r.estimated_value,equity(r),r.new?"NEW":"",
    FLAGS.filter(([f])=>r[f]===true).map(([,l])=>l).join("|")].map(q).join(",");
  const csv=[cols.map(q).join(","),...rows.map(line)].join("\n");
  const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  const a=document.createElement("a");a.href=url;
  a.download=`leads_${rows.length}_${(BOARD.run_date||"export")}.csv`;a.click();URL.revokeObjectURL(url);
}

// ---- boot ----
function boot(){
  BOARD=window.LEADS||{records:[]}; RECS=BOARD.records||[];
  renderCards();
  document.querySelector('.view-btn[data-view="new"]').classList.add("active");
  render();
}
boot();
</script>
</body>
</html>
